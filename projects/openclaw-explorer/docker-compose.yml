services:
  openclaw-explorer:
    build: .
    container_name: openclaw-explorer
    restart: always
    env_file: .env
    environment:
      - VIRTUAL_HOST=oc.${S_DOMAIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=oc.${S_DOMAIN}
    expose:
      - "80"
    volumes:
      - /home/jingtao/.openclaw/agents/main/sessions:/data/sessions:ro
      - /home/jingtao/.openclaw/data/channel-names.json:/data/channel-names.json:ro
