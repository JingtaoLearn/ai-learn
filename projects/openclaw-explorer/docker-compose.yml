services:
  openclaw-explorer:
    build: .
    container_name: openclaw-explorer
    restart: always
    env_file: .env
    environment:
      - VIRTUAL_HOST=oc.${S_DOMAIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=oc.${S_DOMAIN}
      - EMS_UPSTREAM=http://experience-manager:8100
    expose:
      - "80"
    volumes:
      - /home/jingtao/.openclaw/agents/main/sessions:/data/sessions:ro
      - /home/jingtao/.openclaw/data/channel-names.json:/data/channel-names.json:ro
      - /home/jingtao/mnt/customer-sessions:/data/customer-sessions:ro
      - /home/jingtao/.npm-global/lib/node_modules/openclaw/skills:/data/skills-bundled:ro
      - /home/jingtao/.openclaw/workspace/skills:/data/skills-workspace:ro
      - ./allowed-emails.txt:/data/allowed-emails.txt:ro
      - /home/jingtao/.openclaw/workspace/claude-code-results:/data/cc-results:ro
      - /home/jingtao/mnt/feng-cc-results:/data/feng-cc-results:ro
    networks:
      - default
      - ems_network

networks:
  ems_network:
    external: true
    name: experience-manager_default
