name: bug-fix
description: Standard bug fix workflow — root cause analysis, fix implementation, testing, and review

steps:
  - name: root-cause-analysis
    goal: Analyze the bug report and identify the root cause of the issue
    background: Review relevant code, logs, and context to understand what is failing and why
    rules:
      - do-not-modify-code-in-analysis-phase
      - document-all-findings
    acceptance:
      type: human_confirm
    timeout: 30m
    wakePolicy: dependency
    maxRetries: 0

  - name: fix-planning
    goal: Design a minimal fix that addresses the root cause without introducing new issues
    rules:
      - prefer-minimal-changes
      - no-unrelated-refactoring
    acceptance:
      type: human_confirm
    timeout: 20m
    wakePolicy: dependency

  - name: implement-fix
    goal: Implement the approved fix plan in the codebase
    rules:
      - follow-existing-code-style
      - include-inline-comments-for-non-obvious-changes
    acceptance:
      type: ai_self_check
      criteria: Fix is implemented and code compiles without errors
    timeout: 60m
    wakePolicy: dependency
    maxRetries: 2

  - name: write-tests
    goal: Write tests that reproduce the bug and verify the fix
    rules:
      - tests-must-be-deterministic
      - cover-edge-cases
    acceptance:
      type: automated
      command: npm test
    timeout: 30m
    wakePolicy: dependency

  - name: review-and-submit
    goal: Prepare a pull request with the fix, test results, and a clear description
    acceptance:
      type: human_confirm
    timeout: 20m
    wakePolicy: dependency
