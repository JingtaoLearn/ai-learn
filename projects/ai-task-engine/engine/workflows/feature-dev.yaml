name: feature-dev
description: Standard feature development workflow — planning, implementation, tests, and PR

steps:
  - name: requirements-analysis
    goal: Analyze the feature requirements and break them into clear technical tasks
    background: Review the feature request, existing codebase patterns, and any related issues
    rules:
      - document-acceptance-criteria
      - identify-dependencies
    acceptance:
      type: human_confirm
    timeout: 30m
    wakePolicy: dependency

  - name: technical-design
    goal: Create a technical design document covering architecture, data model changes, and API changes
    rules:
      - prefer-existing-patterns
      - minimize-breaking-changes
      - no-premature-abstraction
    acceptance:
      type: human_confirm
    timeout: 45m
    wakePolicy: dependency

  - name: implementation
    goal: Implement the feature according to the approved technical design
    rules:
      - follow-existing-code-style
      - no-unrelated-changes
      - keep-commits-focused
    acceptance:
      type: ai_self_check
      criteria: Feature is implemented according to design, code compiles, no obvious bugs
    timeout: 120m
    wakePolicy: dependency
    maxRetries: 1

  - name: testing
    goal: Write unit tests and integration tests for the new feature
    rules:
      - tests-must-be-deterministic
      - minimum-80-percent-coverage
    acceptance:
      type: automated
      command: npm test
    timeout: 45m
    wakePolicy: dependency

  - name: documentation
    goal: Update README, API docs, and inline comments for the new feature
    rules:
      - keep-docs-concise
      - include-usage-examples
    acceptance:
      type: ai_self_check
      criteria: Documentation is complete and accurate for the implemented feature
    timeout: 30m
    wakePolicy: dependency

  - name: pull-request
    goal: Create a pull request with a clear title, description, and change summary
    acceptance:
      type: human_confirm
    timeout: 20m
    wakePolicy: dependency
