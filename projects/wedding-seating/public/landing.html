<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼喜宴座位安排</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9a96e;
  --gold-light: #f5e6c8;
  --gold-dark: #8b6914;
  --bg: #faf7f2;
  --text: #333;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
}
h1 {
  font-size: 1.4rem;
  color: var(--gold-dark);
  margin-bottom: 8px;
  letter-spacing: 2px;
}
p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--gold-light);
  border-radius: var(--radius);
  font-size: 1rem;
  outline: none;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--gold); }
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
button:hover { opacity: 0.9; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="card">
  <h1>婚礼喜宴座位安排</h1>
  <p>创建新项目开始安排座位</p>
  <input type="text" id="project-name" placeholder="项目名称（如：张三 & 李四 婚礼）" maxlength="60" autofocus>
  <button id="create-btn" onclick="createProject()">创建新项目</button>
</div>
<script>
async function createProject() {
  const btn = document.getElementById('create-btn');
  const nameInput = document.getElementById('project-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  btn.disabled = true;
  btn.textContent = '创建中...';
  try {
    const res = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/p/' + data.id;
    } else {
      alert(data.error || 'Failed to create project');
      btn.disabled = false;
      btn.textContent = '创建新项目';
    }
  } catch (e) {
    alert('Network error');
    btn.disabled = false;
    btn.textContent = '创建新项目';
  }
}
document.getElementById('project-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
});
</script>
</body>
</html>
